<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Market Maker vs. Market Taker">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34fbff"/>
      <stop offset="1" stop-color="#1586f4"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141414"/>
      <stop offset="1" stop-color="#0b0b0b"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#34fbff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#1586f4" stop-opacity="0.7"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#1586f4" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#1586f4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="900" cy="290" rx="360" ry="300" fill="url(#glow)"/>
  <rect x="2" y="2" width="1196" height="626" rx="24" fill="none" stroke="url(#brand)" stroke-opacity="0.18" stroke-width="2"/>

  <g stroke="#ffffff" stroke-opacity="0.035">
    <line x1="90" y1="470" x2="1110" y2="470"/>
    <line x1="90" y1="110" x2="90" y2="470"/>
  </g>

  <rect x="90" y="360" width="112" height="40" rx="20" fill="#111111" stroke="url(#brand)" stroke-width="1.5"/>
  <text x="146" y="386" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="1.5" fill="#34fbff">BASICS</text>
  <text x="90" y="169" font-family="Montserrat, Arial, sans-serif" font-size="50" font-weight="800" fill="#ffffff">Market Maker vs.</text>
  <text x="90" y="231" font-family="Montserrat, Arial, sans-serif" font-size="50" font-weight="800" fill="#ffffff">Market Taker</text>

  <g transform="translate(700,110)">
    <rect x="30" y="290" width="22" height="40" fill="url(#fade)"/><rect x="56" y="250" width="22" height="80" fill="url(#fade)"/><rect x="82" y="210" width="22" height="120" fill="url(#fade)"/><rect x="108" y="170" width="22" height="160" fill="url(#fade)"/><rect x="250" y="140" width="22" height="190" fill="url(#fade)" opacity="0.7"/><rect x="276" y="180" width="22" height="150" fill="url(#fade)" opacity="0.7"/><rect x="302" y="220" width="22" height="110" fill="url(#fade)" opacity="0.7"/><rect x="328" y="260" width="22" height="70" fill="url(#fade)" opacity="0.7"/><circle cx="200" cy="175" r="34" fill="#0b0b0b" stroke="url(#brand)" stroke-width="2.5"/><text x="200" y="187" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="26" font-weight="800" fill="#34fbff">VS</text>
  </g>

  <text x="90" y="585" font-family="Montserrat, Arial, sans-serif" font-size="26" font-weight="700" fill="#ffffff">GREED <tspan fill="#34fbff">LABS</tspan></text>
  <text x="1110" y="585" text-anchor="end" font-family="Montserrat, Arial, sans-serif" font-size="17" font-weight="500" fill="#ffffff" fill-opacity="0.5">greedlabs.org</text>
</svg>