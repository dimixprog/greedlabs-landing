<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Liquidity and trading concepts — depth and price movement">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34fbff"/>
      <stop offset="1" stop-color="#1586f4"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141414"/>
      <stop offset="1" stop-color="#0c0c0c"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1586f4" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#1586f4" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="2" y="2" width="1196" height="626" rx="24" fill="none" stroke="url(#brand)" stroke-opacity="0.18" stroke-width="2"/>

  <!-- concentric liquidity rings -->
  <g fill="none" stroke="url(#brand)">
    <circle cx="600" cy="310" r="60" stroke-opacity="0.9" stroke-width="3"/>
    <circle cx="600" cy="310" r="120" stroke-opacity="0.5" stroke-width="2"/>
    <circle cx="600" cy="310" r="185" stroke-opacity="0.28" stroke-width="2"/>
    <circle cx="600" cy="310" r="250" stroke-opacity="0.14" stroke-width="2"/>
  </g>
  <circle cx="600" cy="310" r="10" fill="#34fbff"/>

  <!-- depth waves at bottom -->
  <path d="M0 470 C 200 430, 400 500, 600 460 C 800 420, 1000 490, 1200 450 L1200 630 L0 630 Z" fill="url(#wave)"/>

  <text x="120" y="590" font-family="Montserrat, Arial, sans-serif" font-size="26" font-weight="700" fill="#ffffff">GREED <tspan fill="#34fbff">LABS</tspan></text>
  <text x="1080" y="590" text-anchor="end" font-family="Montserrat, Arial, sans-serif" font-size="18" font-weight="500" fill="#ffffff" fill-opacity="0.5">Liquidity &amp; Trading</text>
</svg>
