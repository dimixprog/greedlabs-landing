<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Setting Your Token&apos;s Opening Price">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34fbff"/>
      <stop offset="1" stop-color="#1586f4"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141414"/>
      <stop offset="1" stop-color="#0b0b0b"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#34fbff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#1586f4" stop-opacity="0.7"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#1586f4" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#1586f4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="900" cy="290" rx="360" ry="300" fill="url(#glow)"/>
  <rect x="2" y="2" width="1196" height="626" rx="24" fill="none" stroke="url(#brand)" stroke-opacity="0.18" stroke-width="2"/>

  <g stroke="#ffffff" stroke-opacity="0.035">
    <line x1="90" y1="470" x2="1110" y2="470"/>
    <line x1="90" y1="110" x2="90" y2="470"/>
  </g>

  <rect x="90" y="360" width="112" height="40" rx="20" fill="#111111" stroke="url(#brand)" stroke-width="1.5"/>
  <text x="146" y="386" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="1.5" fill="#34fbff">LAUNCH</text>
  <text x="90" y="169" font-family="Montserrat, Arial, sans-serif" font-size="50" font-weight="800" fill="#ffffff">Setting Your Token&apos;s</text>
  <text x="90" y="231" font-family="Montserrat, Arial, sans-serif" font-size="50" font-weight="800" fill="#ffffff">Opening Price</text>

  <g transform="translate(700,110)">
    <path d="M50 58 L50 320 L360 320" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2" fill="none"/><line x1="50" y1="176" x2="360" y2="176" stroke="url(#brand)" stroke-width="2" stroke-dasharray="6 7"/><line x1="150" y1="88" x2="150" y2="300" stroke="#34fbff" stroke-width="3"/><rect x="126" y="138" width="48" height="118" rx="4" fill="url(#fade)" stroke="#34fbff" stroke-width="2"/><circle cx="150" cy="176" r="9" fill="#34fbff"/><line x1="235" y1="116" x2="235" y2="250" stroke="#1586f4" stroke-width="3"/><rect x="216" y="150" width="38" height="70" rx="3" fill="url(#fade)" opacity="0.6"/><line x1="308" y1="96" x2="308" y2="220" stroke="#1586f4" stroke-width="3"/><rect x="290" y="126" width="36" height="60" rx="3" fill="url(#fade)" opacity="0.6"/>
  </g>

  <text x="90" y="585" font-family="Montserrat, Arial, sans-serif" font-size="26" font-weight="700" fill="#ffffff">GREED <tspan fill="#34fbff">LABS</tspan></text>
  <text x="1110" y="585" text-anchor="end" font-family="Montserrat, Arial, sans-serif" font-size="17" font-weight="500" fill="#ffffff" fill-opacity="0.5">greedlabs.org</text>
</svg>