<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Token launch — growth trajectory from TGE to scale">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34fbff"/>
      <stop offset="1" stop-color="#1586f4"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141414"/>
      <stop offset="1" stop-color="#0c0c0c"/>
    </linearGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34fbff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#34fbff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="2" y="2" width="1196" height="626" rx="24" fill="none" stroke="url(#brand)" stroke-opacity="0.18" stroke-width="2"/>

  <g stroke="#ffffff" stroke-opacity="0.04">
    <line x1="120" y1="130" x2="1080" y2="130"/>
    <line x1="120" y1="250" x2="1080" y2="250"/>
    <line x1="120" y1="370" x2="1080" y2="370"/>
    <line x1="120" y1="490" x2="1080" y2="490"/>
  </g>

  <!-- growth area + curve -->
  <path d="M140 490 C 360 470, 500 420, 640 320 C 780 220, 900 170, 1060 140 L1060 490 Z" fill="url(#area)"/>
  <path d="M140 490 C 360 470, 500 420, 640 320 C 780 220, 900 170, 1060 140" fill="none" stroke="url(#brand)" stroke-width="4"/>

  <!-- TGE marker -->
  <circle cx="140" cy="490" r="8" fill="#34fbff"/>
  <rect x="90" y="510" width="100" height="30" rx="15" fill="#111111" stroke="url(#brand)" stroke-width="1.5"/>
  <text x="140" y="530" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="14" font-weight="600" fill="#ffffff">TGE</text>

  <!-- Scale marker -->
  <circle cx="1060" cy="140" r="8" fill="#1586f4"/>
  <rect x="1000" y="90" width="110" height="30" rx="15" fill="#111111" stroke="url(#brand)" stroke-width="1.5"/>
  <text x="1055" y="110" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="14" font-weight="600" fill="#ffffff">SCALE</text>

  <text x="120" y="590" font-family="Montserrat, Arial, sans-serif" font-size="26" font-weight="700" fill="#ffffff">GREED <tspan fill="#34fbff">LABS</tspan></text>
  <text x="1080" y="590" text-anchor="end" font-family="Montserrat, Arial, sans-serif" font-size="18" font-weight="500" fill="#ffffff" fill-opacity="0.5">Token Launch</text>
</svg>
