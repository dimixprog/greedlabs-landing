<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="CEX vs. DEX Market Making">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34fbff"/>
      <stop offset="1" stop-color="#1586f4"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141414"/>
      <stop offset="1" stop-color="#0b0b0b"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#34fbff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#1586f4" stop-opacity="0.7"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#1586f4" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#1586f4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="900" cy="290" rx="360" ry="300" fill="url(#glow)"/>
  <rect x="2" y="2" width="1196" height="626" rx="24" fill="none" stroke="url(#brand)" stroke-opacity="0.18" stroke-width="2"/>

  <g stroke="#ffffff" stroke-opacity="0.035">
    <line x1="90" y1="470" x2="1110" y2="470"/>
    <line x1="90" y1="110" x2="90" y2="470"/>
  </g>

  <rect x="90" y="360" width="124" height="40" rx="20" fill="#111111" stroke="url(#brand)" stroke-width="1.5"/>
  <text x="152" y="386" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="1.5" fill="#34fbff">COMPARE</text>
  <text x="90" y="169" font-family="Montserrat, Arial, sans-serif" font-size="50" font-weight="800" fill="#ffffff">CEX vs. DEX Market</text>
  <text x="90" y="231" font-family="Montserrat, Arial, sans-serif" font-size="50" font-weight="800" fill="#ffffff">Making</text>

  <g transform="translate(700,110)">
    <rect x="18" y="290" width="20" height="40" fill="url(#fade)"/><rect x="44" y="256" width="20" height="74" fill="url(#fade)"/><rect x="70" y="222" width="20" height="108" fill="url(#fade)"/><rect x="96" y="188" width="20" height="142" fill="url(#fade)"/><rect x="122" y="154" width="20" height="176" fill="url(#fade)"/><rect x="148" y="120" width="20" height="210" fill="url(#fade)"/><line x1="200" y1="30" x2="200" y2="340" stroke="url(#brand)" stroke-width="2" stroke-dasharray="5 7" opacity="0.6"/><path d="M228 320 L228 60 M228 320 L392 320" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2" fill="none"/><path d="M238 78 C 262 250, 306 300, 388 312" fill="none" stroke="url(#brand)" stroke-width="5" stroke-linecap="round"/><circle cx="272" cy="196" r="8" fill="#34fbff"/><circle cx="342" cy="296" r="8" fill="#1586f4"/>
