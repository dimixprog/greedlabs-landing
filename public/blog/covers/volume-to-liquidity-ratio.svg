<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Volume-to-Liquidity Ratio">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34fbff"/>
      <stop offset="1" stop-color="#1586f4"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141414"/>
      <stop offset="1" stop-color="#0b0b0b"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#34fbff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#1586f4" stop-opacity="0.7"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#1586f4" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#1586f4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="900" cy="290" rx="360" ry="300" fill="url(#glow)"/>
  <rect x="2" y="2" width="1196" height="626" rx="24" fill="none" stroke="url(#brand)" stroke-opacity="0.18" stroke-width="2"/>

  <g stroke="#ffffff" stroke-opacity="0.035">
    <line x1="90" y1="470" x2="1110" y2="470"/>
    <line x1="90" y1="110" x2="90" y2="470"/>
  </g>

  <rect x="90" y="360" width="124" height="40" rx="20" fill="#111111" stroke="url(#brand)" stroke-width="1.5"/>
  <text x="152" y="386" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="1.5" fill="#34fbff">METRICS</text>
  <text x="90" y="169" font-family="Montserrat, Arial, sans-serif" font-size="50" font-weight="800" fill="#ffffff">Volume-to-Liquidity</text>
  <text x="90" y="231" font-family="Montserrat, Arial, sans-serif" font-size="50" font-weight="800" fill="#ffffff">Ratio</text>

  <g transform="translate(700,110)">
    <path d="M82 252 A118 118 0 0 1 318 252" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="22" stroke-linecap="round"/><path d="M82 252 A118 118 0 0 1 318 252" fill="none" stroke="url(#brand)" stroke-width="22" stroke-linecap="round" stroke-dasharray="259.5 370.7"/><line x1="200" y1="252" x2="256.4" y2="174.3" stroke="#34fbff" stroke-width="6" stroke-linecap="round"/><circle cx="200" cy="252" r="13" fill="#34fbff"/><text x="200" y="220" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="28" font-weight="800" fill="#ffffff" fill-opacity="0.7">V / L</text>
  </g>

  <text x="90" y="585" font-family="Montserrat, Arial, sans-serif" font-size="26" font-weight="700" fill="#ffffff">GREED <tspan fill="#34fbff">LABS</tspan></text>
  <text x="1110" y="585" text-anchor="end" font-family="Montserrat, Arial, sans-serif" font-size="17" font-weight="500" fill="#ffffff" fill-opacity="0.5">greedlabs.org</text>
</svg>