<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="DMM vs. Prop Trading Firm">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34fbff"/>
      <stop offset="1" stop-color="#1586f4"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141414"/>
      <stop offset="1" stop-color="#0b0b0b"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#34fbff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#1586f4" stop-opacity="0.7"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#1586f4" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#1586f4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="900" cy="290" rx="360" ry="300" fill="url(#glow)"/>
  <rect x="2" y="2" width="1196" height="626" rx="24" fill="none" stroke="url(#brand)" stroke-opacity="0.18" stroke-width="2"/>

  <g stroke="#ffffff" stroke-opacity="0.035">
    <line x1="90" y1="470" x2="1110" y2="470"/>
    <line x1="90" y1="110" x2="90" y2="470"/>
  </g>

  <rect x="90" y="360" width="124" height="40" rx="20" fill="#111111" stroke="url(#brand)" stroke-width="1.5"/>
  <text x="152" y="386" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="1.5" fill="#34fbff">COMPARE</text>
  <text x="90" y="169" font-family="Montserrat, Arial, sans-serif" font-size="50" font-weight="800" fill="#ffffff">DMM vs. Prop Trading</text>
  <text x="90" y="231" font-family="Montserrat, Arial, sans-serif" font-size="50" font-weight="800" fill="#ffffff">Firm</text>

  <g transform="translate(700,110)">
    <rect x="24" y="110" width="150" height="150" rx="14" fill="url(#fade)" stroke="url(#brand)" stroke-width="2"/><rect x="44" y="180" width="10" height="20" rx="2" fill="#34fbff" opacity="0.7"/><rect x="60" y="166" width="10" height="34" rx="2" fill="#34fbff" opacity="0.7"/><rect x="76" y="152" width="10" height="48" rx="2" fill="#34fbff" opacity="0.7"/><rect x="92" y="138" width="10" height="62" rx="2" fill="#34fbff" opacity="0.7"/><rect x="112" y="138" width="10" height="62" rx="2" fill="#1586f4" opacity="0.6"/><rect x="128" y="152" width="10" height="48" rx="2" fill="#1586f4" opacity="0.6"/><rect x="144" y="166" width="10" height="34" rx="2" fill="#1586f4" opacity="0.6"/><rect x="160" y="180" width="10" height="20" rx="2" fill="#1586f4" opacity="0.6"/><text x="99" y="240" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="20" font-weight="800" fill="#ffffff">DMM</text><rect x="226" y="110" width="150" height="150" rx="14" fill="url(#fade)" opacity="0.85" stroke="url(#brand)" stroke-opacity="0.6" stroke-width="2"/><text x="301" y="188" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="44" font-weight="800" fill="#34fbff">$</text><text x="301" y="240" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="20" font-weight="800" fill="#ffffff">PROP</text><circle cx="200" cy="185" r="30" fill="#0b0b0b" stroke="url(#brand)" stroke-width="2.5"/><text x="200" y="193" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="19" font-weight="800" fill="#34fbff">VS</text>
  </g>

  <text x="90" y="585" font-family="Montserrat, Arial, sans-serif" font-size="26" font-weight="700" fill="#ffffff">GREED <tspan fill="#34fbff">LABS</tspan></text>
  <text x="1110" y="585" text-anchor="end" font-family="Montserrat, Arial, sans-serif" font-size="17" font-weight="500" fill="#ffffff" fill-opacity="0.5">greedlabs.org</text>
</svg>