    <g stroke="url(#brand)" stroke-opacity="0.35" stroke-width="2"><line x1="200" y1="150" x2="90" y2="90"/><line x1="200" y1="150" x2="310" y2="110"/><line x1="200" y1="150" x2="110" y2="260"/><line x1="200" y1="150" x2="300" y2="250"/><line x1="200" y1="150" x2="200" y2="300"/></g><circle cx="200" cy="150" r="54" fill="url(#fade)" stroke="url(#brand)" stroke-opacity="0.6" stroke-width="2"/><circle cx="90" cy="90" r="30" fill="url(#fade)" stroke="url(#brand)" stroke-opacity="0.6" stroke-width="2"/><circle cx="310" cy="110" r="34" fill="url(#fade)" stroke="url(#brand)" stroke-opacity="0.6" stroke-width="2"/><circle cx="110" cy="260" r="26" fill="url(#fade)" stroke="url(#brand)" stroke-opacity="0.6" stroke-width="2"/><circle cx="300" cy="250" r="40" fill="url(#fade)" stroke="url(#brand)" stroke-opacity="0.6" stroke-width="2"/><circle cx="200" cy="300" r="20" fill="url(#fade)" stroke="url(#brand)" stroke-opacity="0.6" stroke-width="2"/>
