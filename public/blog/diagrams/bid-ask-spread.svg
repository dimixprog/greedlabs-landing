<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320" role="img" aria-label="Diagram of the bid-ask spread: highest bid, lowest ask, and the spread between them">
  <defs>
    <linearGradient id="bid" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34fbff" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#34fbff" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="ask" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0" stop-color="#1586f4" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#1586f4" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <rect width="800" height="320" rx="16" fill="#141414" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- labels -->
  <text x="200" y="46" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="18" font-weight="700" fill="#34fbff">BIDS (buy)</text>
  <text x="600" y="46" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="18" font-weight="700" fill="#1586f4">ASKS (sell)</text>

  <!-- bid ladder -->
  <g font-family="Montserrat, Arial, sans-serif" font-size="14" fill="#ffffff">
    <rect x="60" y="70"  width="280" height="34" fill="url(#bid)"/><text x="76" y="92">$0.98</text>
    <rect x="90" y="112" width="250" height="34" fill="url(#bid)"/><text x="106" y="134">$0.97</text>
    <rect x="120" y="154" width="220" height="34" fill="url(#bid)"/><text x="136" y="176">$0.96</text>
  </g>

  <!-- ask ladder -->
  <g font-family="Montserrat, Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="end">
    <rect x="460" y="70"  width="280" height="34" fill="url(#ask)"/><text x="724" y="92">$1.00</text>
    <rect x="460" y="112" width="250" height="34" fill="url(#ask)"/><text x="724" y="134">$1.01</text>
    <rect x="460" y="154" width="220" height="34" fill="url(#ask)"/><text x="724" y="176">$1.02</text>
  </g>

  <!-- spread bracket -->
  <line x1="340" y1="87" x2="460" y2="87" stroke="#ffffff" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="4 5"/>
  <rect x="330" y="240" width="140" height="44" rx="22" fill="#111111" stroke="#34fbff" stroke-width="1.5"/>
  <text x="400" y="262" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">SPREAD</text>
  <text x="400" y="278" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="12" fill="#34fbff">$0.98 → $1.00</text>
  <path d="M400 240 L400 100" stroke="#34fbff" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#34fbff"/>
    </marker>
  </defs>
</svg>
