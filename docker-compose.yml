version: '3'

services:
  greedlabs-web:
    restart: always
    container_name: greedlabs-web
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3004:3000'
    environment:
      NUXT_TG_VERIFIED: ${NUXT_TG_VERIFIED}
    networks:
      - https

networks:
  https:
    external: true
